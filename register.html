<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  
</head>
<body>
        <nav class="navbar bg-body-tertiary">
        <div class="container-fluid">
            <a class="navbar-brand" href="index.html">W2026</a>
        </div>
    </nav>

    <form>
        <label for="fname">First Name:</label>
        <input type="text" id="fname" name="fname" required><br>

        <label for="lname">Last Name:</label>
        <input type="text" id="lname" name="lname" required><br>

        <label for="email">Email:</label>
        <input type="email" id="email" name="email" required><br>
        
        <label for="password">Password:</label>
        <input type="password" id="password" name="password" required
            minlength="7" maxlength="12" pattern="(?=.*[0-9])[A-Za-z0-9]{7,12}" title="Password must contain 7 - 12 letters with at least
one number"><br>

        <label for="confirm_password">Confirm Password:</label>
        <input type="password" id="confirm_password" name="confirm_password" required
            minlength="7" maxlength="12" pattern="(?=.*[0-9])[A-Za-z0-9]{7,12}"><br>

        <label for="research_student">Research Student:</label><br>
        <input type="radio" name="research" value="yes" required> 
        <label for="male">Yes</label><br>
        <input type="radio" name="research" value="no" required> 
        <label for="female">No</label><br>

        <label for="terms">Accept Terms and Conditions:</label>
        <input type="checkbox" id="terms" name="terms" required><br>

        <a class="btn  btn-outline-secondary" href="index.html" role="button">Cancel</a>
        <input type="submit" class="btn btn-primary" value="Submit">


    </form>

</body>
</html>
